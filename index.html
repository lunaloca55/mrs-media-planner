const fmt = n => n != null ? n.toLocaleString('en-US') : '—';
const fmtPct = (n,d=1) => n != null ? n.toFixed(d)+'%' : '—';
const fmtCompact = n => { if(n>=1e9)return(n/1e9).toFixed(1)+'B'; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return n!=null?n.toString():'—'; };

// Haversine distance in miles
function haversine(lat1,lon1,lat2,lon2){
  const R=3959,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ══════════════════════════════════════════════════════════════
// MAP COMPONENT (D3 + TopoJSON)
// ══════════════════════════════════════════════════════════════
function USMap({ selectedStates, filteredAbbrs, onToggleState, onHoverState, hoveredState, mapView,
  selectedDMAs, onToggleDMA, dmaRankMax, selectionMode, radialCenter, radialRadius, onRadialChange }) {
  const svgRef = useRef(null);
  const [topoData, setTopoData] = useState(null);
  const [projection, setProjection] = useState(null);
  const [pathGen, setPathGen] = useState(null);
  const [dragging, setDragging] = useState(false);

  // Load TopoJSON
  useEffect(() => {
    fetch(US_TOPO_URL).then(r => r.json()).then(data => setTopoData(data)).catch(() => {});
  }, []);

  // Set up projection
  useEffect(() => {
    if (!svgRef.current) return;
    const w = 960, h = 600;
    const proj = d3.geoAlbersUsa().scale(1200).translate([w/2, h/2]);
    const path = d3.geoPath().projection(proj);
    setProjection(() => proj);
    setPathGen(() => path);
  }, [topoData]);

  const features = useMemo(() => {
    if (!topoData) return [];
    return topojson.feature(topoData, topoData.objects.states).features;
  }, [topoData]);

  const getColor = useCallback((fipsId) => {
    const fipsStr = String(fipsId).padStart(2,'0');
    const abbr = FIPS_TO_ABBR[fipsStr];
    const s = ABBR_TO_STATE[abbr];
    if (!s) return '#0a0e16';
    if (!filteredAbbrs.has(abbr)) return '#0d1118';
    const isSelected = selectedStates.has(abbr);
    const isHovered = hoveredState === abbr;
    let t;
    switch(mapView){
      case "population": t=Math.min(1,s.pop2025/40000000); break;
      case "growth": t=Math.min(1,Math.max(0,(((s.pop2025-s.pop2020)/s.pop2020)*100+2)/13)); break;
      case "age": t=(s.medAge-30)/15; break;
      case "urban": t=s.urban/100; break;
      default: t=0.5;
    }
    if(isSelected){
      const r=Math.round(20+t*100),g=Math.round(180+t*40),b=Math.round(140+t*60);
      return isHovered?`rgb(${r+25},${Math.min(255,g+25)},${b+15})`:`rgb(${r},${g},${b})`;
    }
    const base=Math.round(18+t*40),acc=Math.round(28+t*60);
    return isHovered?`rgb(${base+15},${acc+15},${base+25})`:`rgb(${base},${acc},${base+12})`;
  }, [filteredAbbrs, selectedStates, hoveredState, mapView]);

  // Handle mouse for radial selection
  const handleMapMouseDown = useCallback((e) => {
    if (selectionMode !== 'radial' || !projection) return;
    const svg = svgRef.current;
    const rect = svg.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width * 960;
    const y = (e.clientY - rect.top) / rect.height * 600;
    const coords = projection.invert([x, y]);
    if (coords) {
      onRadialChange({ center: [coords[1], coords[0]], radius: 0 });
      setDragging(true);
    }
  }, [selectionMode, projection, onRadialChange]);

  const handleMapMouseMove = useCallback((e) => {
    if (!dragging || !radialCenter || !projection) return;
    const svg = svgRef.current;
    const rect = svg.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width * 960;
    const y = (e.clientY - rect.top) / rect.height * 600;
    const coords = projection.invert([x, y]);
    if (coords) {
      const dist = haversine(radialCenter[0], radialCenter[1], coords[1], coords[0]);
      onRadialChange({ center: radialCenter, radius: Math.round(dist) });
    }
  }, [dragging, radialCenter, projection, onRadialChange]);

  const handleMapMouseUp = useCallback(() => { setDragging(false); }, []);

  // Project DMA positions
  const dmaDots = useMemo(() => {
    if (!projection) return [];
    return DMA_DATA.filter(d => d.rank <= dmaRankMax).map(d => {
      const pos = projection([d.lon, d.lat]);
      return pos ? { ...d, x: pos[0], y: pos[1] } : null;
    }).filter(Boolean);
  }, [projection, dmaRankMax]);

  // Radial circle projection
  const radialCircle = useMemo(() => {
    if (!projection || !radialCenter || !radialRadius) return null;
    const centerPos = projection([radialCenter[1], radialCenter[0]]);
    if (!centerPos) return null;
    // Approximate: project a point `radius` miles east to get pixel radius
    const milesPerDegLon = 69 * Math.cos(radialCenter[0] * Math.PI / 180);
    const degOffset = radialRadius / milesPerDegLon;
    const edgePos = projection([radialCenter[1] + degOffset, radialCenter[0]]);
    if (!edgePos) return null;
    const pxRadius = Math.abs(edgePos[0] - centerPos[0]);
    return { cx: centerPos[0], cy: centerPos[1], r: pxRadius };
  }, [projection, radialCenter, radialRadius]);

  if (!topoData || !pathGen) {
    return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'var(--text-tertiary)',fontSize:13}}>Loading map data...</div>;
  }

  return (
    <svg ref={svgRef} viewBox="0 0 960 600" style={{width:'100%',height:'100%',cursor:selectionMode==='radial'?'crosshair':'default'}}
      preserveAspectRatio="xMidYMid meet"
      onMouseDown={handleMapMouseDown} onMouseMove={handleMapMouseMove} onMouseUp={handleMapMouseUp} onMouseLeave={handleMapMouseUp}>
      {/* BG */}
      <rect width="960" height="600" fill="var(--bg-primary)"/>

      {/* States */}
      {features.map(f => {
        const fipsStr = String(f.id).padStart(2,'0');
        const abbr = FIPS_TO_ABBR[fipsStr];
        const isFiltered = abbr && filteredAbbrs.has(abbr);
        const isSelected = abbr && selectedStates.has(abbr);
        return <path key={f.id} d={pathGen(f)} fill={getColor(f.id)}
          stroke={isSelected ? 'var(--accent-blue)' : isFiltered ? '#1e2a42' : '#111827'}
          strokeWidth={isSelected ? 1.8 : 0.5}
          style={{cursor:isFiltered&&selectionMode==='state'?'pointer':'default',transition:'fill 0.15s'}}
          onClick={(e) => { if(selectionMode==='state'&&isFiltered){e.stopPropagation();onToggleState(abbr);} }}
          onMouseEnter={() => abbr && onHoverState(abbr)}
          onMouseLeave={() => onHoverState(null)}
        />;
      })}

      {/* State outlines (borders only) */}
      {topoData.objects.states && (
        <path d={pathGen(topojson.mesh(topoData, topoData.objects.states, (a,b)=>a!==b))}
          fill="none" stroke="#1a2540" strokeWidth="0.4" style={{pointerEvents:'none'}}/>
      )}

      {/* Radial selection circle */}
      {radialCircle && (
        <g style={{pointerEvents:'none'}}>
          <circle cx={radialCircle.cx} cy={radialCircle.cy} r={radialCircle.r}
            fill="rgba(96,165,250,0.08)" stroke="var(--accent-blue)" strokeWidth="1.5" strokeDasharray="6,3"/>
          <circle cx={radialCircle.cx} cy={radialCircle.cy} r={4} fill="var(--accent-blue)"/>
          {radialRadius > 0 && <text x={radialCircle.cx} y={radialCircle.cy - radialCircle.r - 8}
            textAnchor="middle" style={{fontSize:11,fill:'var(--text-primary)',fontFamily:'"IBM Plex Mono",monospace',fontWeight:600}}>
            {radialRadius} mi
          </text>}
        </g>
      )}

      {/* DMA dots */}
      {dmaDots.map(d => {
        const isSel = selectedDMAs.has(d.rank);
        const r = Math.max(4, Math.sqrt(d.tvHH / 400000) * 3);
        return <g key={'dma'+d.rank} style={{cursor:selectionMode==='metro'?'pointer':'default'}}
          onClick={(e) => { if(selectionMode==='metro'){e.stopPropagation();onToggleDMA(d.rank);} }}>
          <circle cx={d.x} cy={d.y} r={r+2} fill="transparent"/>
          <circle cx={d.x} cy={d.y} r={r}
            fill={isSel ? 'var(--accent-yellow)' : 'rgba(251,191,36,0.2)'}
            stroke={isSel ? 'var(--accent-yellow)' : 'rgba(251,191,36,0.4)'}
            strokeWidth={isSel ? 1.5 : 0.8}
            style={{transition:'all 0.15s'}}/>
          {isSel && <text x={d.x} y={d.y - r - 5} textAnchor="middle"
            style={{fontSize:8,fill:'var(--accent-yellow)',fontFamily:'"Instrument Sans",sans-serif',fontWeight:600}}>
            {d.market}
          </text>}
        </g>;
      })}
    </svg>
  );
}

function App() {
  const [selectedStates, setSelectedStates] = useState(new Set());
  const [selectedRegion, setSelectedRegion] = useState(null);
  const [selectedDMAs, setSelectedDMAs] = useState(new Set());
  const [hoveredState, setHoveredState] = useState(null);
  const [popMin, setPopMin] = useState(0);
  const [popMax, setPopMax] = useState(50000000);
  const [medAgeMin, setMedAgeMin] = useState(25);
  const [medAgeMax, setMedAgeMax] = useState(55);
  const [urbanMin, setUrbanMin] = useState(0);
  const [growthFilter, setGrowthFilter] = useState("all");
  const [dmaRankMax, setDmaRankMax] = useState(50);
  const [selectedPlatforms, setSelectedPlatforms] = useState(new Set(PLATFORM_DATA.map(p=>p.name)));
  const [activeTab, setActiveTab] = useState("geo");
  const [mapView, setMapView] = useState("population");
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  // Selection mode: 'state', 'metro', 'radial'
  const [selectionMode, setSelectionMode] = useState('state');
  const [radialCenter, setRadialCenter] = useState(null);
  const [radialRadius, setRadialRadius] = useState(0);

  const filteredStates = useMemo(() => {
    return STATE_DATA.filter(s => {
      const g = ((s.pop2025-s.pop2020)/s.pop2020)*100;
      if(s.pop2025<popMin||s.pop2025>popMax) return false;
      if(s.medAge<medAgeMin||s.medAge>medAgeMax) return false;
      if(s.urban<urbanMin) return false;
      if(growthFilter==="growing"&&g<=0) return false;
      if(growthFilter==="declining"&&g>0) return false;
      return true;
    });
  }, [popMin,popMax,medAgeMin,medAgeMax,urbanMin,growthFilter]);
  const filteredAbbrs = useMemo(() => new Set(filteredStates.map(s=>s.abbr)), [filteredStates]);

  const handleRegionSelect = useCallback((region) => {
    if(selectedRegion===region){setSelectedRegion(null);setSelectedStates(new Set());}
    else{setSelectedRegion(region);setSelectedStates(new Set((CENSUS_REGIONS[region]||[]).filter(a=>filteredAbbrs.has(a))));}
  }, [selectedRegion,filteredAbbrs]);

  const toggleState = useCallback((abbr) => {
    setSelectedRegion(null);
    setSelectedStates(prev=>{const n=new Set(prev);if(n.has(abbr))n.delete(abbr);else n.add(abbr);return n;});
  }, []);
  const toggleDMA = useCallback((rank) => {
    setSelectedDMAs(prev=>{const n=new Set(prev);if(n.has(rank))n.delete(rank);else n.add(rank);return n;});
  }, []);

  // Radial selection: auto-select states whose centroid falls within radius
  const handleRadialChange = useCallback(({center, radius}) => {
    setRadialCenter(center);
    setRadialRadius(radius);
    if (radius > 0 && center) {
      const inRange = new Set();
      STATE_DATA.forEach(s => {
        const c = STATE_CENTROIDS[s.abbr];
        if (c && filteredAbbrs.has(s.abbr)) {
          const dist = haversine(center[0], center[1], c[0], c[1]);
          if (dist <= radius) inRange.add(s.abbr);
        }
      });
      setSelectedStates(inRange);
      setSelectedRegion(null);
      // Also select DMAs within radius
      const dmasInRange = new Set();
      DMA_DATA.forEach(d => {
        const dist = haversine(center[0], center[1], d.lat, d.lon);
        if (dist <= radius) dmasInRange.add(d.rank);
      });
      setSelectedDMAs(dmasInRange);
    }
  }, [filteredAbbrs]);

  const selectAllFiltered = () => setSelectedStates(new Set(filteredStates.map(s=>s.abbr)));
  const clearSelection = () => { setSelectedStates(new Set());setSelectedRegion(null);setSelectedDMAs(new Set());setRadialCenter(null);setRadialRadius(0); };

  const summary = useMemo(() => {
    const sel = STATE_DATA.filter(s=>selectedStates.has(s.abbr));
    if(!sel.length) return null;
    const tp=sel.reduce((a,s)=>a+s.pop2025,0), tp20=sel.reduce((a,s)=>a+s.pop2020,0);
    const tb=sel.reduce((a,s)=>a+s.births,0), td=sel.reduce((a,s)=>a+s.deaths,0);
    const tim=sel.reduce((a,s)=>a+s.intlMig,0), tdm=sel.reduce((a,s)=>a+s.domMig,0);
    return {states:sel,totalPop:tp,totalPop2020:tp20,totalBirths:tb,totalDeaths:td,totalIntlMig:tim,totalDomMig:tdm,
      avgAge:sel.reduce((a,s)=>a+s.medAge*s.pop2025,0)/tp,
      avgUrban:sel.reduce((a,s)=>a+s.urban*s.pop2025,0)/tp,
      growthPct:((tp-tp20)/tp20)*100,
      usPct:(tp/341784857)*100,
      avgWhite:sel.reduce((a,s)=>a+s.white*s.pop2025,0)/tp,
      avgBlack:sel.reduce((a,s)=>a+s.black*s.pop2025,0)/tp,
      avgHisp:sel.reduce((a,s)=>a+s.hisp*s.pop2025,0)/tp,
    };
  }, [selectedStates]);

  // Hover tooltip
  const hoveredData = hoveredState ? ABBR_TO_STATE[hoveredState] : null;
  const hoveredGrowth = hoveredData ? ((hoveredData.pop2025-hoveredData.pop2020)/hoveredData.pop2020*100) : 0;

  return (
    <div style={{width:'100%',height:'100vh',display:'flex',fontFamily:'"Instrument Sans",sans-serif',background:'var(--bg-primary)',color:'var(--text-primary)',overflow:'hidden'}}>

      {/* ═══ LEFT PANEL ═══ */}
      <div style={{width:sidebarCollapsed?48:310,minWidth:sidebarCollapsed?48:310,background:'var(--bg-secondary)',borderRight:'1px solid var(--border-subtle)',display:'flex',flexDirection:'column',transition:'width 0.25s,min-width 0.25s',overflow:'hidden'}}>
        <div style={{padding:12,display:'flex',alignItems:'center',justifyContent:sidebarCollapsed?'center':'space-between',borderBottom:'1px solid var(--border-subtle)',cursor:'pointer',minHeight:44}} onClick={()=>setSidebarCollapsed(!sidebarCollapsed)}>
          {!sidebarCollapsed&&<span style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color:'var(--accent-blue)'}}>Filters</span>}
          <span style={{fontSize:18,color:'var(--accent-blue)',lineHeight:1}}>{sidebarCollapsed?'▸':'◂'}</span>
        </div>
        {!sidebarCollapsed&&(
          <div style={{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:20}}>
            <FilterSection title="Census Region">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>

                </div>
                <div style={{background:'var(--bg-card)',borderRadius:10,padding:16,border:'1px solid var(--border-subtle)',fontSize:12,lineHeight:1.8}}>
                  <div style={{fontWeight:700,color:'var(--accent-yellow)',marginBottom:8,fontSize:11,letterSpacing:0.5,textTransform:'uppercase'}}>DMA Markets</div>
                  {selectedDMAs.size>0?(<>
                    <div style={{color:'var(--text-secondary)'}}>Markets: <span style={{color:'var(--text-primary)',fontWeight:600}}>{DMA_DATA.filter(d=>selectedDMAs.has(d.rank)).map(d=>d.market).join(', ')}</span></div>
                    <div style={{color:'var(--text-secondary)'}}>TV HH: <span style={{color:'var(--text-primary)',fontFamily:'"IBM Plex Mono",monospace',fontWeight:600}}>{fmt(DMA_DATA.filter(d=>selectedDMAs.has(d.rank)).reduce((a,d)=>a+d.tvHH,0))}</span></div>
                  </>):<div style={{color:'var(--text-muted)'}}>No DMA markets selected</div>}
                </div>
                <div style={{background:'var(--bg-card)',borderRadius:10,padding:16,border:'1px solid var(--border-subtle)',fontSize:12,lineHeight:1.8}}>
                  <div style={{fontWeight:700,color:'var(--accent-purple)',marginBottom:8,fontSize:11,letterSpacing:0.5,textTransform:'uppercase'}}>Platform Reach</div>
                  {PLATFORM_DATA.filter(p=>selectedPlatforms.has(p.name)).map(p=>{
                    const reach=Math.round(summary.totalPop*p.pctPop/100);
                    return <div key={p.name} style={{display:'flex',justifyContent:'space-between',color:'var(--text-secondary)'}}>
                      <span style={{fontWeight:500}}>{p.name}</span><span style={{color:'var(--text-primary)',fontFamily:'"IBM Plex Mono",monospace',fontWeight:600,fontSize:11}}>~{fmtCompact(reach)} DAU</span>
                    </div>;
                  })}
                </div>
                <div style={{background:'var(--bg-card)',borderRadius:10,padding:16,border:'1px solid var(--border-subtle)',fontSize:12,lineHeight:1.8}}>
                  <div style={{fontWeight:700,color:'var(--accent-cyan)',marginBottom:8,fontSize:11,letterSpacing:0.5,textTransform:'uppercase'}}>Demographics</div>
                  <div style={{color:'var(--text-secondary)'}}>White: <span style={{color:'var(--text-primary)',fontWeight:600}}>{summary.avgWhite.toFixed(1)}%</span></div>
                  <div style={{color:'var(--text-secondary)'}}>Black: <span style={{color:'var(--text-primary)',fontWeight:600}}>{summary.avgBlack.toFixed(1)}%</span></div>
                  <div style={{color:'var(--text-secondary)'}}>Hispanic: <span style={{color:'var(--text-primary)',fontWeight:600}}>{summary.avgHisp.toFixed(1)}%</span></div>
                  <div style={{color:'var(--text-secondary)'}}>Births/yr: <span style={{color:'var(--text-primary)',fontWeight:600}}>{fmt(summary.totalBirths)}</span></div>
                  <div style={{color:'var(--text-secondary)'}}>Deaths/yr: <span style={{color:'var(--text-primary)',fontWeight:600}}>{fmt(summary.totalDeaths)}</span></div>
                  <div style={{color:'var(--text-secondary)'}}>Intl. Migration: <span style={{color:'var(--text-primary)',fontWeight:600}}>{fmt(summary.totalIntlMig)}</span></div>
                  <div style={{color:'var(--text-secondary)'}}>Dom. Migration: <span style={{color:summary.totalDomMig>0?'var(--accent-green)':'var(--accent-red)',fontWeight:700}}>{fmt(summary.totalDomMig)}</span></div>
                </div>
                <div style={{background:'var(--bg-card)',borderRadius:10,padding:14,border:'1px solid var(--border-subtle)',fontSize:10,color:'var(--text-muted)',lineHeight:1.6,fontWeight:500}}>
                  <strong style={{color:'var(--text-tertiary)'}}>Sources:</strong> Census Bureau Vintage 2025 · CDC PLACES 2025 · Nielsen DMA 2026 · Platform Q4 2025 DAU/MAU · SBA Advocacy 2025 · BLS OES 2024
                </div>
              </>):<EmptyState message="Build your targeting plan by selecting states and DMA markets, then review the brief here"/>}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
