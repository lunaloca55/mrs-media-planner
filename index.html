:root {
  --bg-0: #06080d;
  --bg-1: #0c1017;
  --bg-2: #111822;
  --bg-3: #17202f;
  --bg-card: #0f1520;
  --border-0: #1a2436;
  --border-1: #243352;
  --border-active: #3b82f6;
  --text-0: #f2f4f8;
  --text-1: #c0c8d8;
  --text-2: #8892a8;
  --text-3: #5a6478;
  --blue: #5b9cf6;
  --blue-dim: rgba(91,156,246,0.1);
  --green: #36d49a;
  --green-dim: rgba(54,212,154,0.08);
  --red: #f07068;
  --red-dim: rgba(240,112,104,0.08);
  --yellow: #f0b940;
  --yellow-dim: rgba(240,185,64,0.08);
  --purple: #a78bfa;
  --cyan: #34d4e8;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', system-ui, sans-serif;
  --radius: 10px;
  --radius-sm: 6px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
body { height:100%; font-family:var(--sans); background:var(--bg-0); color:var(--text-0); overflow:hidden; }
#app { display:flex; height:100vh; }
button { font-family:var(--sans); cursor:pointer; border:none; background:none; color:inherit; }
input[type=range] { -webkit-appearance:none; appearance:none; height:4px; border-radius:2px; background:var(--bg-3); outline:none; cursor:pointer; width:100%; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--blue); cursor:pointer; border:2px solid var(--bg-1); box-shadow:0 0 8px rgba(91,156,246,0.3); }
input[type=range]::-moz-range-thumb { width:14px; height:14px; border-radius:50%; background:var(--blue); border:2px solid var(--bg-1); cursor:pointer; }
input[type=checkbox] { accent-color:var(--blue); width:14px; height:14px; cursor:pointer; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border-0); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--border-1); }

/* ─── LAYOUT ─── */
.sidebar { width:290px; min-width:290px; background:var(--bg-1); border-right:1px solid var(--border-0); display:flex; flex-direction:column; transition:width .2s, min-width .2s; overflow:hidden; }
.sidebar.collapsed { width:44px; min-width:44px; }
.sidebar-header { padding:10px 14px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border-0); min-height:44px; }
.sidebar-header h3 { font-size:10px; font-weight:700; letter-spacing:1.8px; text-transform:uppercase; color:var(--blue); }
.sidebar-toggle { font-size:16px; color:var(--text-2); transition:color .15s; padding:4px; }
.sidebar-toggle:hover { color:var(--blue); }
.sidebar-body { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:18px; }
.filter-label { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-2); margin-bottom:6px; }
.filter-group { display:flex; flex-direction:column; }
.range-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.range-label { font-size:11px; color:var(--text-3); }
.range-value { font-size:11px; color:var(--text-0); font-family:var(--mono); font-weight:500; }
.btn-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.btn-pill { padding:7px 6px; border-radius:var(--radius-sm); border:1px solid var(--border-0); font-size:11px; font-weight:600; color:var(--text-2); transition:all .12s; text-align:center; }
.btn-pill:hover { border-color:var(--border-1); color:var(--text-1); }
.btn-pill.active { background:var(--blue-dim); border-color:var(--blue); color:var(--blue); }
.btn-row { display:flex; gap:4px; }
.btn-row .btn-pill { flex:1; }
.platform-row { display:flex; align-items:center; gap:7px; padding:3px 0; font-size:12px; }
.platform-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.platform-pct { margin-left:auto; color:var(--text-3); font-family:var(--mono); font-size:10px; font-weight:500; }
.sidebar-actions { display:flex; gap:6px; padding-top:12px; border-top:1px solid var(--border-0); }
.sidebar-actions button { flex:1; padding:9px; border-radius:var(--radius-sm); font-size:11px; font-weight:700; }
.btn-select-all { background:var(--blue-dim); color:var(--blue); }
.btn-select-all:hover { background:rgba(91,156,246,0.18); }
.btn-clear { border:1px solid rgba(240,112,104,0.25); color:var(--red); }
.btn-clear:hover { background:var(--red-dim); }
.filter-count { font-size:11px; color:var(--text-3); text-align:center; margin-top:4px; }

/* ─── CENTER ─── */
.center { flex:1; display:flex; flex-direction:column; min-width:0; }
.topbar { padding:6px 14px; border-bottom:1px solid var(--border-0); display:flex; align-items:center; gap:12px; background:var(--bg-1); flex-wrap:wrap; min-height:48px; }
.brand { display:flex; align-items:center; gap:9px; }
.brand-icon { width:32px; height:32px; border-radius:8px; background:linear-gradient(135deg,#3b82f6,#22d3ee); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:900; color:var(--bg-0); }
.brand-name { font-size:15px; font-weight:800; letter-spacing:-0.4px; }
.brand-sub { font-size:8px; color:var(--text-3); font-weight:700; letter-spacing:1px; text-transform:uppercase; }
.mode-toggle { display:flex; background:var(--bg-0); border-radius:8px; padding:2px; margin-left:auto; }
.mode-toggle button { padding:5px 14px; border-radius:6px; font-size:11px; font-weight:600; color:var(--text-3); transition:all .12s; }
.mode-toggle button.active { background:var(--blue); color:var(--bg-0); }
.view-btns { display:flex; gap:3px; }
.view-btns button { padding:4px 10px; border-radius:var(--radius-sm); border:1px solid var(--border-0); font-size:10px; font-weight:600; color:var(--text-3); transition:all .12s; }
.view-btns button.active { border-color:var(--blue); color:var(--blue); background:var(--blue-dim); }
.map-area { flex:1; position:relative; overflow:hidden; background:var(--bg-0); }
.map-area svg { width:100%; height:100%; display:block; }
.map-legend { position:absolute; bottom:12px; left:12px; background:rgba(12,16,23,0.94); border:1px solid var(--border-0); border-radius:var(--radius); padding:10px 14px; backdrop-filter:blur(12px); }
.map-legend-title { font-size:9px; font-weight:700; color:var(--text-3); letter-spacing:0.8px; text-transform:uppercase; margin-bottom:5px; }
.legend-bar { width:80px; height:5px; border-radius:3px; }
.legend-row { display:flex; align-items:center; gap:6px; margin-top:4px; }
.legend-dot { width:7px; height:7px; border-radius:50%; }
.legend-text { font-size:9px; color:var(--text-3); font-weight:500; }
.map-tooltip { pointer-events:none; position:absolute; background:rgba(15,21,32,0.96); border:1px solid var(--border-1); border-radius:var(--radius); padding:12px 16px; box-shadow:0 12px 40px rgba(0,0,0,0.5); z-index:50; backdrop-filter:blur(12px); }
.map-tooltip h4 { font-size:14px; font-weight:700; margin-bottom:6px; }
.tooltip-grid { display:grid; grid-template-columns:auto auto; gap:3px 18px; font-size:12px; }
.tooltip-label { color:var(--text-3); }
.tooltip-val { font-family:var(--mono); font-weight:500; }
.map-loading { display:flex; align-items:center; justify-content:center; height:100%; color:var(--text-3); font-size:13px; gap:8px; }
.map-loading .spinner { width:18px; height:18px; border:2px solid var(--border-0); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ─── RIGHT PANEL ─── */
.panel { width:380px; min-width:380px; background:var(--bg-1); border-left:1px solid var(--border-0); display:flex; flex-direction:column; overflow:hidden; }
.tabs { display:flex; border-bottom:1px solid var(--border-0); }
.tabs button { flex:1; padding:11px 4px; font-size:10px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:var(--text-3); border-bottom:2px solid transparent; transition:all .12s; }

.hero-sub { font-size:12px; color:var(--text-1); margin-top:4px; font-weight:500; }
.metric-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.metric-card { background:var(--bg-card); border:1px solid var(--border-0); border-radius:var(--radius); padding:12px 14px; }
.metric-label { font-size:9px; font-weight:700; letter-spacing:0.6px; text-transform:uppercase; color:var(--text-3); margin-bottom:4px; }
.metric-value { font-size:19px; font-weight:700; font-family:var(--mono); letter-spacing:-0.4px; }
.card { background:var(--bg-card); border:1px solid var(--border-0); border-radius:var(--radius); padding:14px; }
.card-title { font-size:9px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--text-2); margin-bottom:10px; }
.eth-bar { display:flex; height:7px; border-radius:4px; overflow:hidden; margin-bottom:8px; }
.eth-legend { display:flex; gap:12px; font-size:11px; color:var(--text-1); font-weight:500; }
.growth-row { display:flex; align-items:center; gap:7px; font-size:11px; margin-bottom:4px; }
.growth-abbr { width:24px; color:var(--text-1); font-weight:600; flex-shrink:0; }
.growth-bar-bg { flex:1; height:6px; background:var(--bg-3); border-radius:3px; overflow:hidden; }
.growth-bar-fill { height:100%; border-radius:3px; transition:width .3s; }
.growth-pct { width:48px; text-align:right; font-family:var(--mono); font-size:10px; font-weight:600; flex-shrink:0; }
.detail-table { width:100%; border-collapse:collapse; font-size:11px; }
.detail-table th { padding:6px 5px; text-align:left; color:var(--text-3); font-weight:700; font-size:9px; letter-spacing:0.5px; border-bottom:1px solid var(--border-0); }
.detail-table td { padding:5px; border-bottom:1px solid rgba(26,36,54,0.5); }
.dma-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:8px; cursor:pointer; transition:all .12s; border:1px solid transparent; }
.dma-item:hover { background:rgba(240,185,64,0.03); }
.dma-item.selected { background:var(--yellow-dim); border-color:rgba(240,185,64,0.2); }

.dma-name { flex:1; font-size:12px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.dma-stats { text-align:right; flex-shrink:0; }
.dma-hh { font-size:11px; font-family:var(--mono); font-weight:500; }
.dma-pct { font-size:9px; color:var(--text-3); font-weight:500; }
.platform-card { border-radius:var(--radius); padding:14px; background:var(--bg-card); border:1px solid var(--border-0); }
.platform-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.platform-title { font-size:14px; font-weight:700; }
.platform-dau-label { margin-left:auto; font-size:11px; color:var(--text-3); font-weight:500; }
.platform-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.platform-stat-label { font-size:8px; font-weight:700; text-transform:uppercase; color:var(--text-3); letter-spacing:0.4px; margin-bottom:2px; }
.platform-stat-value { font-size:12px; font-family:var(--mono); font-weight:500; }

.platform-bar-fill { height:100%; border-radius:3px; opacity:0.6; }
.platform-penetration { font-size:9px; color:var(--text-3); margin-top:3px; font-weight:500; }

.brief-row strong { color:var(--text-0); font-weight:600; }
.brief-mono { font-family:var(--mono); font-weight:600; }
.sources-card { font-size:10px; color:var(--text-3); line-height:1.6; font-weight:500; }

function haversine(lat1,lon1,lat2,lon2){const R=3959,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

function subscribe(fn){ listeners.push(fn); }
function notify(){ listeners.forEach(fn=>fn()); }

// Derived
function getFilteredStates(){
  return STATE_DATA.filter(s=>{
    const g=((s.pop2025-s.pop2020)/s.pop2020)*100;
    if(s.pop2025<state.popMin||s.pop2025>state.popMax)return false;
    if(s.medAge<state.medAgeMin||s.medAge>state.medAgeMax)return false;
    if(s.urban<state.urbanMin)return false;
    if(state.growthFilter==="growing"&&g<=0)return false;
    if(state.growthFilter==="declining"&&g>0)return false;
    return true;
  });
}
function getFilteredAbbrs(){ return new Set(getFilteredStates().map(s=>s.abbr)); }
function getSummary(){
  const sel=STATE_DATA.filter(s=>state.selectedStates.has(s.abbr));
  if(!sel.length)return null;
  const tp=sel.reduce((a,s)=>a+s.pop2025,0),tp20=sel.reduce((a,s)=>a+s.pop2020,0);
  const tb=sel.reduce((a,s)=>a+s.births,0),td=sel.reduce((a,s)=>a+s.deaths,0);
  const tim=sel.reduce((a,s)=>a+s.intlMig,0),tdm=sel.reduce((a,s)=>a+s.domMig,0);
  return {states:sel,totalPop:tp,totalPop2020:tp20,totalBirths:tb,totalDeaths:td,totalIntlMig:tim,totalDomMig:tdm,
    avgAge:sel.reduce((a,s)=>a+s.medAge*s.pop2025,0)/tp,
    avgUrban:sel.reduce((a,s)=>a+s.urban*s.pop2025,0)/tp,
    growthPct:((tp-tp20)/tp20)*100,
    usPct:(tp/US_POP)*100,
    avgWhite:sel.reduce((a,s)=>a+s.white*s.pop2025,0)/tp,
    avgBlack:sel.reduce((a,s)=>a+s.black*s.pop2025,0)/tp,
    avgHisp:sel.reduce((a,s)=>a+s.hisp*s.pop2025,0)/tp,
  };
}

// ════════════════════════════════════════════════════════════
function initMap(){
  const container=document.getElementById('map-container');
  if(!container)return;
  container.innerHTML='<div class="map-loading"><div class="spinner"></div>Loading map…</div>';

  // Load D3 + TopoJSON from CDN
  function loadScript(url){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=url;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}

  Promise.all([
    typeof d3==='undefined'?loadScript('https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js'):Promise.resolve(),
    typeof topojson==='undefined'?loadScript('https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js'):Promise.resolve(),
  ]).then(()=>{
    return fetch(US_TOPO_URL).then(r=>{if(!r.ok)throw new Error('Failed to load map');return r.json();});
  }).then(topo=>{
    const W=960,H=600;
    const proj=d3.geoAlbersUsa().scale(1200).translate([W/2,H/2]);
    const path=d3.geoPath().projection(proj);
    state.topoData=topo;state.projection=proj;state.pathGen=path;state.mapReady=true;
    renderMap();
  }).catch(err=>{
    console.error('Map load error:',err);
    container.innerHTML='<div class="map-loading" style="flex-direction:column;gap:10px;"><span style="font-size:20px;">⚠️</span><span>Unable to load map data. Check your connection and refresh.</span></div>';
  });
}

function getStateColor(abbr,isSelected,isHovered,isFiltered){
  if(!isFiltered)return '#0a0e14';
  const s=ABBR_TO_STATE[abbr];
  let t;
  switch(state.mapView){
    case"population":t=Math.min(1,s.pop2025/40000000);break;
    case"growth":t=Math.min(1,Math.max(0,(((s.pop2025-s.pop2020)/s.pop2020)*100+2)/13));break;
    case"age":t=(s.medAge-30)/15;break;
    case"urban":t=s.urban/100;break;
    default:t=0.5;
  }
  if(isSelected){
    const r=Math.round(16+t*80),g=Math.round(160+t*50),b=Math.round(130+t*60);
    return isHovered?`rgb(${r+20},${Math.min(255,g+20)},${b+15})`:`rgb(${r},${g},${b})`;
  }
  const base=Math.round(14+t*35),acc=Math.round(24+t*55);
  return isHovered?`rgb(${base+12},${acc+12},${base+20})`:`rgb(${base},${acc},${base+8})`;
}

function renderMap(){
  const container=document.getElementById('map-container');
  if(!container||!state.mapReady)return;
  const {topoData,projection:proj,pathGen:path}=state;
  const features=topojson.feature(topoData,topoData.objects.states).features;
  const filteredAbbrs=getFilteredAbbrs();
  const W=960,H=600;

  // Build SVG string
  let svg=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%;display:block;cursor:${state.selectionMode==='radial'?'crosshair':'default'}">`;
  svg+=`<rect width="${W}" height="${H}" fill="var(--bg-0)"/>`;

  // State paths
  features.forEach(f=>{
    const fipsStr=String(f.id).padStart(2,'0');
    const abbr=FIPS_TO_ABBR[fipsStr];
    if(!abbr)return;
    const isFiltered=filteredAbbrs.has(abbr);
    const isSelected=state.selectedStates.has(abbr);
    const isHovered=state.hoveredState===abbr;
    const fill=getStateColor(abbr,isSelected,isHovered,isFiltered);
    const stroke=isSelected?'var(--blue)':isFiltered?'#1a2436':'#0f1520';
    const sw=isSelected?1.8:0.5;
    const cursor=isFiltered&&state.selectionMode==='state'?'pointer':'default';
    svg+=`<path d="${path(f)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" style="cursor:${cursor};transition:fill .12s" data-abbr="${abbr}" data-filtered="${isFiltered?1:0}"/>`;
  });

  // State borders
  const mesh=topojson.mesh(topoData,topoData.objects.states,(a,b)=>a!==b);
  svg+=`<path d="${path(mesh)}" fill="none" stroke="#141e30" stroke-width="0.4" style="pointer-events:none"/>`;

  // Radial circle
  if(state.radialCenter&&state.radialRadius>0){
    const cp=proj([state.radialCenter[1],state.radialCenter[0]]);
    if(cp){
      const mpdl=69*Math.cos(state.radialCenter[0]*Math.PI/180);
      const degOff=state.radialRadius/mpdl;
      const ep=proj([state.radialCenter[1]+degOff,state.radialCenter[0]]);
      if(ep){
        const pxR=Math.abs(ep[0]-cp[0]);
        svg+=`<circle cx="${cp[0]}" cy="${cp[1]}" r="${pxR}" fill="rgba(91,156,246,0.07)" stroke="var(--blue)" stroke-width="1.5" stroke-dasharray="6,3" style="pointer-events:none"/>`;
        svg+=`<circle cx="${cp[0]}" cy="${cp[1]}" r="4" fill="var(--blue)" style="pointer-events:none"/>`;
        svg+=`<text x="${cp[0]}" y="${cp[1]-pxR-7}" text-anchor="middle" style="font-size:11px;fill:var(--text-0);font-family:var(--mono);font-weight:600;pointer-events:none">${state.radialRadius} mi</text>`;
      }
    }
  }

  // DMA dots
  DMA_DATA.filter(d=>d.rank<=state.dmaRankMax).forEach(d=>{
    const pos=proj([d.lon,d.lat]);
    if(!pos)return;
    const isSel=state.selectedDMAs.has(d.rank);
    const r=Math.max(4,Math.sqrt(d.tvHH/400000)*3);
    svg+=`<circle cx="${pos[0]}" cy="${pos[1]}" r="${r+3}" fill="transparent" data-dma="${d.rank}" style="cursor:${state.selectionMode==='metro'?'pointer':'default'}"/>`;
    svg+=`<circle cx="${pos[0]}" cy="${pos[1]}" r="${r}" fill="${isSel?'var(--yellow)':'rgba(240,185,64,0.18)'}" stroke="${isSel?'var(--yellow)':'rgba(240,185,64,0.35)'}" stroke-width="${isSel?1.5:0.8}" style="transition:all .12s;pointer-events:none"/>`;
    if(isSel){
      svg+=`<text x="${pos[0]}" y="${pos[1]-r-5}" text-anchor="middle" style="font-size:8px;fill:var(--yellow);font-family:var(--sans);font-weight:700;pointer-events:none">${esc(d.market)}</text>`;
    }
  });

  svg+='</svg>';
  container.innerHTML=svg;

  // Attach event listeners
  const svgEl=container.querySelector('svg');
  if(!svgEl)return;

  svgEl.addEventListener('click',function(e){
    const stPath=e.target.closest('[data-abbr]');
    if(stPath&&stPath.dataset.filtered==='1'&&state.selectionMode==='state'){
      const abbr=stPath.dataset.abbr;
      const sel=new Set(state.selectedStates);
      if(sel.has(abbr))sel.delete(abbr);else sel.add(abbr);
      update({selectedStates:sel,selectedRegion:null});
      return;
    }
    const dmaEl=e.target.closest('[data-dma]');
    if(dmaEl&&state.selectionMode==='metro'){
      const rank=parseInt(dmaEl.dataset.dma);
      const sel=new Set(state.selectedDMAs);
      if(sel.has(rank))sel.delete(rank);else sel.add(rank);
      update({selectedDMAs:sel});
      return;
    }
  });

  svgEl.addEventListener('mousemove',function(e){
    const stPath=e.target.closest('[data-abbr]');
    const abbr=stPath?stPath.dataset.abbr:null;
    if(abbr!==state.hoveredState){
      state.hoveredState=abbr;
      renderTooltip();
      // Lightweight re-render of just hover colors
      container.querySelectorAll('[data-abbr]').forEach(p=>{
        const a=p.dataset.abbr;
        const isFilt=getFilteredAbbrs().has(a);
        p.setAttribute('fill',getStateColor(a,state.selectedStates.has(a),state.hoveredState===a,isFilt));
      });
    }
  });

  svgEl.addEventListener('mouseleave',function(){
    state.hoveredState=null;renderTooltip();
    container.querySelectorAll('[data-abbr]').forEach(p=>{
      const a=p.dataset.abbr;
      const isFilt=getFilteredAbbrs().has(a);
      p.setAttribute('fill',getStateColor(a,state.selectedStates.has(a),false,isFilt));
    });
  });

  // Radial drag
  let dragging=false;
  svgEl.addEventListener('mousedown',function(e){
    if(state.selectionMode!=='radial'||!state.projection)return;
    const rect=svgEl.getBoundingClientRect();
    const x=(e.clientX-rect.left)/rect.width*960;
    const y=(e.clientY-rect.top)/rect.height*600;
    const coords=state.projection.invert([x,y]);
    if(coords){
      state.radialCenter=[coords[1],coords[0]];state.radialRadius=0;
      dragging=true;
    }
  });
  svgEl.addEventListener('mousemove',function(e){
    if(!dragging||!state.radialCenter)return;
    const rect=svgEl.getBoundingClientRect();
    const x=(e.clientX-rect.left)/rect.width*960;
    const y=(e.clientY-rect.top)/rect.height*600;
    const coords=state.projection.invert([x,y]);
    if(coords){
      const dist=haversine(state.radialCenter[0],state.radialCenter[1],coords[1],coords[0]);
      state.radialRadius=Math.round(dist);
      // Auto-select states in radius
      const filtAbbrs=getFilteredAbbrs();
      const inRange=new Set();
      STATE_DATA.forEach(s=>{
        const c=STATE_CENTROIDS[s.abbr];
        if(c&&filtAbbrs.has(s.abbr)&&haversine(state.radialCenter[0],state.radialCenter[1],c[0],c[1])<=state.radialRadius)inRange.add(s.abbr);
      });
      const dmasIn=new Set();
      DMA_DATA.forEach(d=>{if(haversine(state.radialCenter[0],state.radialCenter[1],d.lat,d.lon)<=state.radialRadius)dmasIn.add(d.rank);});
      update({selectedStates:inRange,selectedDMAs:dmasIn,selectedRegion:null});
    }
  });
  function endDrag(){dragging=false;}
  svgEl.addEventListener('mouseup',endDrag);
  svgEl.addEventListener('mouseleave',endDrag);
}

function renderTooltip(){
  const el=document.getElementById('map-tooltip');
  if(!el)return;
  const abbr=state.hoveredState;
  if(!abbr){el.style.display='none';return;}
  const s=ABBR_TO_STATE[abbr];
  if(!s){el.style.display='none';return;}
  const g=((s.pop2025-s.pop2020)/s.pop2020*100);
  const gc=g>0?'var(--green)':'var(--red)';
  el.style.display='block';
  el.innerHTML=`<h4>${esc(s.name)}</h4><div class="tooltip-grid">
    <span class="tooltip-label">Population</span><span class="tooltip-val" style="color:var(--text-0)">${fmt(s.pop2025)}</span>
    <span class="tooltip-label">Growth</span><span class="tooltip-val" style="color:${gc};font-weight:600">${g>0?'+':''}${g.toFixed(1)}%</span>
    <span class="tooltip-label">Med. Age</span><span class="tooltip-val" style="color:var(--text-0)">${s.medAge}</span>
    <span class="tooltip-label">Urban</span><span class="tooltip-val" style="color:var(--text-0)">${s.urban}%</span>
  </div>`;
}

function renderPanel(){
  const panel=document.getElementById('panel-body');
  if(!panel)return;
  const tab=state.activeTab;
  const summary=getSummary();

  if(tab==='geo') panel.innerHTML=renderGeoTab(summary);
  else if(tab==='dma') panel.innerHTML=renderDMATab(summary);
  else if(tab==='platforms') panel.innerHTML=renderPlatformsTab(summary);
  else if(tab==='summary') panel.innerHTML=renderBriefTab(summary);

  // Attach DMA click handlers
  if(tab==='dma'){
    panel.querySelectorAll('[data-dma-click]').forEach(el=>{
      el.addEventListener('click',()=>{
        const rank=parseInt(el.dataset.dmaClick);
        const sel=new Set(state.selectedDMAs);
        if(sel.has(rank))sel.delete(rank);else sel.add(rank);
        update({selectedDMAs:sel});
      });
    });
  }
}

    <div class="hero-card">
      <div class="hero-label">Est. Reachable Population</div>

    </div>
    <div class="metric-grid">
      <div class="metric-card"><div class="metric-label">5-Yr Growth</div><div class="metric-value" style="color:${summary.growthPct>0?'var(--green)':'var(--red)'}">${(summary.growthPct>0?'+':'')+summary.growthPct.toFixed(1)}%</div></div>

      <div class="metric-card"><div class="metric-label">Net Migration</div><div class="metric-value" style="color:var(--green)">${fmtCompact(summary.totalIntlMig+summary.totalDomMig)}</div></div>
    </div>
    <div class="card">
      <div class="card-title">Ethnic Composition (weighted)</div>
      <div class="eth-bar">
        <div style="width:${summary.avgWhite}%;background:var(--cyan)"></div>
        <div style="width:${summary.avgBlack}%;background:var(--purple)"></div>
        <div style="width:${summary.avgHisp}%;background:var(--yellow)"></div>
        <div style="flex:1;background:var(--bg-3)"></div>
      </div>
      <div class="eth-legend">
        <span><span style="color:var(--cyan)">●</span> White ${summary.avgWhite.toFixed(1)}%</span>
        <span><span style="color:var(--purple)">●</span> Black ${summary.avgBlack.toFixed(1)}%</span>
        <span><span style="color:var(--yellow)">●</span> Hisp. ${summary.avgHisp.toFixed(1)}%</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">State Growth (2020–25)</div>
      <div style="max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:4px">
        ${sorted.map(s=>{const g=((s.pop2025-s.pop2020)/s.pop2020)*100;return `<div class="growth-row"><span class="growth-abbr">${s.abbr}</span><div class="growth-bar-bg"><div class="growth-bar-fill" style="width:${Math.min(100,Math.abs(g)/11*100)}%;background:${g>0?'var(--green)':'var(--red)'}"></div></div><span class="growth-pct" style="color:${g>0?'var(--green)':'var(--red)'}">${g>0?'+':''}${g.toFixed(1)}%</span></div>`;}).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">State Detail</div>
      <div style="overflow-x:auto">
        <table class="detail-table"><thead><tr>${['State','Pop','Growth','Age','Urban','Employer'].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>
        ${tableSorted.map(s=>{const g=((s.pop2025-s.pop2020)/s.pop2020)*100;return `<tr><td style="font-weight:600">${s.abbr}</td><td style="font-family:var(--mono);font-size:10px;font-weight:500">${fmtCompact(s.pop2025)}</td><td style="font-family:var(--mono);font-size:10px;font-weight:600;color:${g>0?'var(--green)':'var(--red)'}">${g>0?'+':''}${g.toFixed(1)}%</td><td style="font-family:var(--mono);font-size:10px;color:var(--text-1)">${s.medAge}</td><td style="font-family:var(--mono);font-size:10px;color:var(--text-1)">${s.urban}%</td><td style="font-size:10px;color:var(--text-3);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.topEmployer)}</td></tr>`;}).join('')}
        </tbody></table>
      </div>
    </div>`;
}

function renderDMATab(){
  const selDMAs=DMA_DATA.filter(d=>state.selectedDMAs.has(d.rank));
  let html=`<div style="font-size:11px;color:var(--text-3);font-weight:500;margin-bottom:4px">Switch to <strong style="color:var(--blue)">Metros</strong> mode to click DMA dots, or select below.</div>`;
  if(selDMAs.length){
    html+=`<div class="dma-hero"><div class="hero-label" style="color:var(--yellow)">DMA Reach</div><div class="hero-value" style="font-size:28px">${fmt(selDMAs.reduce((a,d)=>a+d.tvHH,0))}</div><div class="hero-sub">TV Households · ${selDMAs.reduce((a,d)=>a+d.pct,0).toFixed(2)}% of U.S.</div></div>`;
  }
  DMA_DATA.filter(d=>d.rank<=state.dmaRankMax).forEach(d=>{
    const isSel=state.selectedDMAs.has(d.rank);
    html+=`<div class="dma-item${isSel?' selected':''}" data-dma-click="${d.rank}">
      <span class="dma-rank" style="background:${isSel?'var(--yellow)':'var(--bg-3)'};color:${isSel?'var(--bg-0)':'var(--text-3)'}">#${d.rank}</span>
      <span class="dma-name">${esc(d.market)}</span>
      <div class="dma-stats"><div class="dma-hh">${fmtCompact(d.tvHH)}</div><div class="dma-pct">${d.pct}% US</div></div>
    </div>`;
  });
  return html;
}

  PLATFORM_DATA.filter(p=>state.selectedPlatforms.has(p.name)).forEach(p=>{
    const estReach=Math.round(regionPop*p.pctPop/100);
    html+=`<div class="platform-card">
      <div class="platform-header"><div class="platform-dot" style="background:${p.color}"></div><span class="platform-title">${esc(p.name)}</span><span class="platform-dau-label">DAU: ${p.dauUS}</span></div>

      <div class="filter-group">
        <div class="filter-label">DMA Rank (Top N)</div>
        <div class="range-row"><span class="range-label">Top</span><span class="range-value" id="dma-val">${state.dmaRankMax}</span></div>
        <input type="range" id="dmamax" min="5" max="50" step="5" value="${state.dmaRankMax}">
      </div>
      <div class="filter-group">
        <div class="filter-label">Platforms</div>
        ${PLATFORM_DATA.map(p=>`<label class="platform-row"><input type="checkbox" data-platform="${p.name}" ${state.selectedPlatforms.has(p.name)?'checked':''}><div class="platform-dot" style="background:${p.color}"></div><span style="font-weight:500">${esc(p.name)}</span><span class="platform-pct">${p.pctPop}%</span></label>`).join('')}
      </div>
      <div class="sidebar-actions">
        <button class="btn-select-all" id="btn-sel-all">Select All</button>
        <button class="btn-clear" id="btn-clear">Clear</button>
      </div>
      <div class="filter-count" id="filter-count">${filteredStates.length} match · ${state.selectedStates.size} selected</div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="topbar">
      <div class="brand">
        <div class="brand-icon">M</div>
        <div><div class="brand-name">MediaScope Planner</div><div class="brand-sub">Census 2025 · DMA 2026</div></div>
      </div>
      <div class="mode-toggle" id="mode-toggle">
        ${[['state','🗺 States'],['metro','📍 Metros'],['radial','◎ Radius']].map(([m,l])=>`<button data-mode="${m}" class="${state.selectionMode===m?'active':''}">${l}</button>`).join('')}
      </div>
      <div class="view-btns" id="view-btns">
        ${[["population","Population"],["growth","Growth"],["age","Med. Age"],["urban","Urban"]].map(([v,l])=>`<button data-view="${v}" class="${state.mapView===v?'active':''}">${l}</button>`).join('')}
      </div>
    </div>
    <div class="map-area">
      <div id="map-container" style="width:100%;height:100%"></div>
      <div class="map-legend">
        <div class="map-legend-title" id="legend-title">${state.mapView==='population'?'Population':state.mapView==='growth'?'Growth 2020–25':state.mapView==='age'?'Median Age':'Urban %'}</div>
        <div class="legend-row"><div class="legend-bar" style="background:linear-gradient(to right,#0e1520,#145838,#36d49a)"></div><span class="legend-text">Low → High</span></div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--yellow)"></div><span class="legend-text">DMA Markets</span></div>
        ${state.selectionMode==='radial'?`<div style="margin-top:4px;font-size:9px;color:var(--blue);font-weight:600">Click & drag to set radius</div>`:''}
      </div>
      <div class="map-tooltip" id="map-tooltip" style="display:none;top:12px;left:50%;transform:translateX(-50%)"></div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel">
    <div class="tabs" id="tabs">
      ${[["geo","Geography"],["dma","DMA"],["platforms","Platforms"],["summary","Brief"]].map(([k,l])=>`<button data-tab="${k}" class="${state.activeTab===k?'active':''}">${l}</button>`).join('')}
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>`;

  // Wire up events
  wireEvents();
  initMap();
  renderPanel();
}

function wireEvents(){
  // Sidebar toggle
  document.getElementById('sidebar-toggle-btn').addEventListener('click',()=>{
    update({sidebarCollapsed:!state.sidebarCollapsed});
    buildLayout();
  });

  // Region buttons
  document.querySelectorAll('.region-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const r=btn.dataset.region;
      const filtAbbrs=getFilteredAbbrs();
      if(state.selectedRegion===r){update({selectedRegion:null,selectedStates:new Set()});}
      else{update({selectedRegion:r,selectedStates:new Set((CENSUS_REGIONS[r]||[]).filter(a=>filtAbbrs.has(a)))});}
      buildLayout();
    });
  });

  // Range sliders
  function bindRange(id,key,valId,format){
    const el=document.getElementById(id);
    if(!el)return;
    el.addEventListener('input',()=>{
      state[key]=Number(el.value);
      const valEl=document.getElementById(valId);
      if(valEl)valEl.textContent=format(state[key]);
    });
    el.addEventListener('change',()=>{
      update({});renderMap();renderPanel();renderSidebar();
    });
  }
  bindRange('popmin','popMin','popmin-val',fmtCompact);
  bindRange('popmax','popMax','popmax-val',fmtCompact);
  bindRange('agemin','medAgeMin','agemin-val',v=>v.toFixed(1));
  bindRange('agemax','medAgeMax','agemax-val',v=>v.toFixed(1));
  bindRange('urbanmin','urbanMin','urban-val',v=>v+'%');
  bindRange('dmamax','dmaRankMax','dma-val',String);

  // Growth filter
  document.querySelectorAll('.growth-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      update({growthFilter:btn.dataset.growth});
      buildLayout();
    });
  });

  // Platforms
  document.querySelectorAll('[data-platform]').forEach(cb=>{
    cb.addEventListener('change',()=>{
      const plats=new Set(state.selectedPlatforms);
      if(cb.checked)plats.add(cb.dataset.platform);else plats.delete(cb.dataset.platform);
      update({selectedPlatforms:plats});renderPanel();
    });
  });

  // Select all / clear
  const selAll=document.getElementById('btn-sel-all');
  if(selAll)selAll.addEventListener('click',()=>{update({selectedStates:new Set(getFilteredStates().map(s=>s.abbr))});renderMap();renderPanel();renderSidebar();});
  const clearBtn=document.getElementById('btn-clear');
  if(clearBtn)clearBtn.addEventListener('click',()=>{update({selectedStates:new Set(),selectedRegion:null,selectedDMAs:new Set(),radialCenter:null,radialRadius:0});renderMap();renderPanel();renderSidebar();});

  // Mode toggle
  document.getElementById('mode-toggle').addEventListener('click',e=>{
    const btn=e.target.closest('[data-mode]');
    if(!btn)return;
    update({selectionMode:btn.dataset.mode});
    buildLayout();
  });

  // View toggle
  document.getElementById('view-btns').addEventListener('click',e=>{
    const btn=e.target.closest('[data-view]');
    if(!btn)return;
    update({mapView:btn.dataset.view});
    buildLayout();
  });

  // Tabs
  document.getElementById('tabs').addEventListener('click',e=>{
    const btn=e.target.closest('[data-tab]');
    if(!btn)return;
    state.activeTab=btn.dataset.tab;
    document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.activeTab));
    renderPanel();
  });
}

// Subscribe to updates for lightweight re-renders
subscribe(()=>{
  renderMap();
  renderPanel();
  renderSidebar();
});

// Boot
buildLayout();
</script>
</body>
</html>
