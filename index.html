const fmt = (n) => n != null ? n.toLocaleString('en-US') : '—';
const fmtPct = (n, d=1) => n != null ? n.toFixed(d) + '%' : '—';
const fmtCompact = (n) => {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n != null ? n.toString() : '—';
};

function FilterSection({ title, children }) {
  return (
    <div>
      <div style={{fontSize:10,fontWeight:600,color:'#4a5568',letterSpacing:0.8,textTransform:'uppercase',marginBottom:8}}>{title}</div>

}

function RangeSlider({ label, value, min, max, step, onChange, format }) {
  return (
    <div style={{marginBottom:6}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
        <span style={{fontSize:10,color:'#5a6478'}}>{label}</span>
        <span style={{fontSize:10,color:'#c8cdd8',fontFamily:'"JetBrains Mono",monospace'}}>{format(value)}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e => onChange(Number(e.target.value))}
        style={{width:'100%'}}/>
    </div>
  );
}

function MetricCard({ label, value, color }) {
  return (
    <div style={{background:'#0e1218',borderRadius:8,padding:'10px 12px',border:'1px solid #1a2035'}}>

  );
}

function EmptyState({ message }) {

function App() {
  const [selectedStates, setSelectedStates] = useState(new Set());
  const [selectedRegion, setSelectedRegion] = useState(null);
  const [selectedDMAs, setSelectedDMAs] = useState(new Set());
  const [hoveredState, setHoveredState] = useState(null);
  const [popMin, setPopMin] = useState(0);
  const [popMax, setPopMax] = useState(50000000);
  const [medAgeMin, setMedAgeMin] = useState(25);
  const [medAgeMax, setMedAgeMax] = useState(55);
  const [urbanMin, setUrbanMin] = useState(0);
  const [growthFilter, setGrowthFilter] = useState("all");
  const [dmaRankMax, setDmaRankMax] = useState(50);
  const [selectedPlatforms, setSelectedPlatforms] = useState(new Set(PLATFORM_DATA.map(p => p.name)));
  const [activeTab, setActiveTab] = useState("geo");
  const [mapView, setMapView] = useState("population");
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

  const filteredStates = useMemo(() => {
    return STATE_DATA.filter(s => {
      const growthPct = ((s.pop2025 - s.pop2020) / s.pop2020) * 100;
      if (s.pop2025 < popMin || s.pop2025 > popMax) return false;
      if (s.medAge < medAgeMin || s.medAge > medAgeMax) return false;
      if (s.urban < urbanMin) return false;
      if (growthFilter === "growing" && growthPct <= 0) return false;
      if (growthFilter === "declining" && growthPct > 0) return false;
      return true;
    });
  }, [popMin, popMax, medAgeMin, medAgeMax, urbanMin, growthFilter]);

  const filteredAbbrs = useMemo(() => new Set(filteredStates.map(s => s.abbr)), [filteredStates]);

  const handleRegionSelect = useCallback((region) => {
    if (selectedRegion === region) { setSelectedRegion(null); setSelectedStates(new Set()); }
    else { setSelectedRegion(region); setSelectedStates(new Set((CENSUS_REGIONS[region]||[]).filter(a => filteredAbbrs.has(a)))); }
  }, [selectedRegion, filteredAbbrs]);

  const toggleState = useCallback((abbr) => {
    setSelectedRegion(null);
    setSelectedStates(prev => { const n = new Set(prev); if (n.has(abbr)) n.delete(abbr); else n.add(abbr); return n; });
  }, []);

  const toggleDMA = useCallback((rank) => {
    setSelectedDMAs(prev => { const n = new Set(prev); if (n.has(rank)) n.delete(rank); else n.add(rank); return n; });
  }, []);

  const selectAllFiltered = () => setSelectedStates(new Set(filteredStates.map(s => s.abbr)));
  const clearSelection = () => { setSelectedStates(new Set()); setSelectedRegion(null); setSelectedDMAs(new Set()); };

  const summary = useMemo(() => {
    const sel = STATE_DATA.filter(s => selectedStates.has(s.abbr));
    if (sel.length === 0) return null;
    const totalPop = sel.reduce((a,s) => a + s.pop2025, 0);
    const totalPop2020 = sel.reduce((a,s) => a + s.pop2020, 0);
    const totalBirths = sel.reduce((a,s) => a + s.births, 0);
    const totalDeaths = sel.reduce((a,s) => a + s.deaths, 0);
    const totalIntlMig = sel.reduce((a,s) => a + s.intlMig, 0);
    const totalDomMig = sel.reduce((a,s) => a + s.domMig, 0);
    const avgAge = sel.reduce((a,s) => a + s.medAge * s.pop2025, 0) / totalPop;
    const avgUrban = sel.reduce((a,s) => a + s.urban * s.pop2025, 0) / totalPop;
    const growthPct = ((totalPop - totalPop2020) / totalPop2020) * 100;
    const usPct = (totalPop / 341784857) * 100;
    const avgWhite = sel.reduce((a,s) => a + s.white * s.pop2025, 0) / totalPop;
    const avgBlack = sel.reduce((a,s) => a + s.black * s.pop2025, 0) / totalPop;
    const avgHisp = sel.reduce((a,s) => a + s.hisp * s.pop2025, 0) / totalPop;
    return { states:sel, totalPop, totalPop2020, totalBirths, totalDeaths, totalIntlMig, totalDomMig, avgAge, avgUrban, growthPct, usPct, avgWhite, avgBlack, avgHisp };
  }, [selectedStates]);

  const getStateColor = useCallback((abbr) => {
    const s = STATE_DATA.find(st => st.abbr === abbr);
    if (!s) return '#1a1f2e';
    if (!filteredAbbrs.has(abbr)) return '#0d1017';
    const isSelected = selectedStates.has(abbr);
    const isHovered = hoveredState === abbr;
    let intensity;
    switch(mapView) {
      case "population": intensity = Math.min(1, s.pop2025 / 40000000); break;
      case "growth": intensity = Math.min(1, Math.max(0, (((s.pop2025-s.pop2020)/s.pop2020)*100 + 2) / 13)); break;
      case "age": intensity = (s.medAge - 30) / 15; break;
      case "urban": intensity = s.urban / 100; break;
      default: intensity = 0.5;
    }
    if (isSelected) {
      const r = Math.round(20 + intensity * 180), g = Math.round(220 - intensity * 80), b = Math.round(120 + intensity * 60);
      return isHovered ? `rgb(${r+30},${Math.min(255,g+30)},${b+20})` : `rgb(${r},${g},${b})`;
    }
    const base = Math.round(25 + intensity * 50), accent = Math.round(35 + intensity * 80);
    return isHovered ? `rgb(${base+20},${accent+20},${base+40})` : `rgb(${base},${accent},${base+15})`;
  }, [filteredAbbrs, selectedStates, hoveredState, mapView]);

  return (
    <div style={{width:'100%',height:'100vh',display:'flex',fontFamily:'"DM Sans",system-ui,sans-serif',background:'#080b12',color:'#c8cdd8',overflow:'hidden'}}>

      {/* LEFT PANEL */}
      <div style={{width:sidebarCollapsed?48:320,minWidth:sidebarCollapsed?48:320,background:'#0c1019',borderRight:'1px solid #1a2035',display:'flex',flexDirection:'column',transition:'width 0.3s, min-width 0.3s',overflow:'hidden'}}>
        <div style={{padding:'12px',display:'flex',alignItems:'center',justifyContent:sidebarCollapsed?'center':'space-between',borderBottom:'1px solid #1a2035',cursor:'pointer'}} onClick={()=>setSidebarCollapsed(!sidebarCollapsed)}>
          {!sidebarCollapsed && <span style={{fontSize:11,fontWeight:600,letterSpacing:1.5,textTransform:'uppercase',color:'#4fd1a5'}}>Targeting Filters</span>}
          <span style={{fontSize:16,color:'#4fd1a5'}}>{sidebarCollapsed?'▸':'◂'}</span>
        </div>
        {!sidebarCollapsed && (
          <div style={{flex:1,overflowY:'auto',padding:'16px',display:'flex',flexDirection:'column',gap:20}}>
            <FilterSection title="Census Region">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                {Object.keys(CENSUS_REGIONS).map(r => (
                  <button key={r} onClick={()=>handleRegionSelect(r)} style={{padding:'8px 4px',borderRadius:6,border:'1px solid',fontSize:11,fontWeight:500,cursor:'pointer',background:selectedRegion===r?'#162b22':'transparent',borderColor:selectedRegion===r?'#4fd1a5':'#1e2740',color:selectedRegion===r?'#4fd1a5':'#7a8299',transition:'all 0.15s'}}>{r}</button>
                ))}
              </div>
            </FilterSection>
            <FilterSection title="Population Range">
              <RangeSlider label="Min" value={popMin} min={0} max={50000000} step={500000} onChange={setPopMin} format={fmtCompact}/>
              <RangeSlider label="Max" value={popMax} min={0} max={50000000} step={500000} onChange={setPopMax} format={fmtCompact}/>
            </FilterSection>
            <FilterSection title="Median Age Range">
              <RangeSlider label="Min" value={medAgeMin} min={25} max={55} step={0.5} onChange={setMedAgeMin} format={v=>v.toFixed(1)}/>
              <RangeSlider label="Max" value={medAgeMax} min={25} max={55} step={0.5} onChange={setMedAgeMax} format={v=>v.toFixed(1)}/>
            </FilterSection>
            <FilterSection title="Min. Urbanization %">
              <RangeSlider label="Urban" value={urbanMin} min={0} max={100} step={5} onChange={setUrbanMin} format={v=>v+'%'}/>
            </FilterSection>
            <FilterSection title="Population Growth (2020-25)">
              <div style={{display:'flex',gap:4}}>
                {[["all","All"],["growing","Growing"],["declining","Declining"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setGrowthFilter(v)} style={{flex:1,padding:'7px 4px',borderRadius:6,border:'1px solid',fontSize:10,fontWeight:500,cursor:'pointer',background:growthFilter===v?'#162b22':'transparent',borderColor:growthFilter===v?'#4fd1a5':'#1e2740',color:growthFilter===v?'#4fd1a5':'#7a8299'}}>{l}</button>
                ))}
              </div>
            </FilterSection>
            <FilterSection title="DMA Market Rank (Top N)">
              <RangeSlider label="Top" value={dmaRankMax} min={5} max={50} step={5} onChange={setDmaRankMax} format={v=>v.toString()}/>
            </FilterSection>
            <FilterSection title="Platforms of Interest">
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                {PLATFORM_DATA.map(p=>(
                  <label key={p.name} style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',padding:'4px 0',fontSize:12}}>
                    <input type="checkbox" checked={selectedPlatforms.has(p.name)} onChange={()=>setSelectedPlatforms(prev=>{const n=new Set(prev);if(n.has(p.name))n.delete(p.name);else n.add(p.name);return n;})}/>
                    <span style={{width:8,height:8,borderRadius:'50%',background:p.color,display:'inline-block',flexShrink:0}}/>
                    <span style={{color:'#c8cdd8'}}>{p.name}</span>
                    <span style={{marginLeft:'auto',color:'#5a6478',fontFamily:'"JetBrains Mono",monospace',fontSize:10}}>{p.pctPop}% US</span>
                  </label>
                ))}
              </div>
            </FilterSection>
            <div style={{display:'flex',gap:8,paddingTop:8,borderTop:'1px solid #1a2035'}}>
              <button onClick={selectAllFiltered} style={{flex:1,padding:'10px',borderRadius:8,border:'none',background:'#162b22',color:'#4fd1a5',fontSize:11,fontWeight:600,cursor:'pointer',letterSpacing:0.5}}>Select Matching</button>
              <button onClick={clearSelection} style={{flex:1,padding:'10px',borderRadius:8,border:'1px solid #2a1525',background:'transparent',color:'#e06070',fontSize:11,fontWeight:600,cursor:'pointer',letterSpacing:0.5}}>Clear All</button>
            </div>
            <div style={{fontSize:10,color:'#3e4a60',textAlign:'center',paddingTop:4}}>{filteredStates.length} states match filters · {selectedStates.size} selected</div>
          </div>
        )}
      </div>

      {/* CENTER MAP */}
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
        <div style={{padding:'10px 20px',borderBottom:'1px solid #1a2035',display:'flex',alignItems:'center',justifyContent:'space-between',background:'#0a0e16'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:32,height:32,borderRadius:8,background:'linear-gradient(135deg,#4fd1a5,#2a9d8f)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'#080b12'}}>M</div>
            <div>
              <div style={{fontSize:15,fontWeight:600,color:'#e8ecf4',letterSpacing:-0.3}}>MediaScope Planner</div>
              <div style={{fontSize:10,color:'#4a5568',letterSpacing:0.5}}>CENSUS 2025 · DMA 2026 · PLATFORM DATA</div>
            </div>
          </div>
          <div style={{display:'flex',gap:6}}>
            {[["population","Pop Size"],["growth","Growth %"],["age","Med. Age"],["urban","Urban %"]].map(([v,l])=>(
              <button key={v} onClick={()=>setMapView(v)} style={{padding:'6px 12px',borderRadius:6,border:'1px solid',fontSize:10,fontWeight:500,cursor:'pointer',background:mapView===v?'#162b22':'transparent',borderColor:mapView===v?'#4fd1a5':'#1e2740',color:mapView===v?'#4fd1a5':'#5a6478',transition:'all 0.15s'}}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{flex:1,position:'relative',overflow:'hidden',background:'#080b12'}}>
          <svg viewBox="60 90 830 450" style={{width:'100%',height:'100%'}} preserveAspectRatio="xMidYMid meet">
            {[150,200,250,300,350,400,450].map(y=><line key={y} x1="60" y1={y} x2="890" y2={y} stroke="#0f1520" strokeWidth="0.5"/>)}
            {[200,300,400,500,600,700,800].map(x=><line key={x} x1={x} y1="90" x2={x} y2="540" stroke="#0f1520" strokeWidth="0.5"/>)}
            {STATE_DATA.map(s=>{
              const path=STATE_PATHS[s.abbr]; if(!path)return null;
              const isFiltered=filteredAbbrs.has(s.abbr), isSelected=selectedStates.has(s.abbr);
              return(<g key={s.abbr}><path d={path} fill={getStateColor(s.abbr)} stroke={isSelected?'#4fd1a5':isFiltered?'#1e2b40':'#111722'} strokeWidth={isSelected?1.5:0.5} style={{cursor:isFiltered?'pointer':'default',transition:'fill 0.2s, stroke 0.2s'}} onClick={()=>isFiltered&&toggleState(s.abbr)} onMouseEnter={()=>setHoveredState(s.abbr)} onMouseLeave={()=>setHoveredState(null)}/></g>);
            })}
            {STATE_DATA.map(s=>{
              const path=STATE_PATHS[s.abbr]; if(!path)return null;
              const nums=path.match(/[\d.]+/g)?.map(Number)||[]; let cx=0,cy=0,ct=0;
              for(let i=0;i<nums.length;i+=2){cx+=nums[i];cy+=nums[i+1];ct++;} cx/=ct;cy/=ct;
              const isSelected=selectedStates.has(s.abbr);
              return(<text key={s.abbr+'_l'} x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" style={{fontSize:isSelected?8:6,fontWeight:isSelected?600:400,fill:isSelected?'#e8ecf4':'#3e4a60',pointerEvents:'none',fontFamily:'"DM Sans",sans-serif'}}>{s.abbr}</text>);
            })}
            {DMA_DATA.filter(d=>d.rank<=dmaRankMax).map(d=>{
              const x=((d.lon+130)/65)*780+80, y=((50-d.lat)/30)*380+110;
              const isSel=selectedDMAs.has(d.rank), r=Math.max(3,Math.sqrt(d.tvHH/500000)*3);
              return(<g key={'dma_'+d.rank}><circle cx={x} cy={y} r={r} fill={isSel?'#f0c040':'#f0c04030'} stroke={isSel?'#f0c040':'#f0c04050'} strokeWidth={0.5} style={{cursor:'pointer',transition:'all 0.2s'}} onClick={()=>toggleDMA(d.rank)}/>{isSel&&<text x={x} y={y-r-4} textAnchor="middle" style={{fontSize:6,fill:'#f0c040',fontFamily:'"DM Sans",sans-serif',fontWeight:500}}>{d.market}</text>}</g>);
            })}
          </svg>
          <div style={{position:'absolute',bottom:16,left:16,background:'#0c1019e0',borderRadius:8,padding:'10px 14px',border:'1px solid #1a2035',backdropFilter:'blur(8px)'}}>
            <div style={{fontSize:9,fontWeight:600,color:'#4a5568',letterSpacing:1,marginBottom:6,textTransform:'uppercase'}}>{mapView==='population'?'Population Size':mapView==='growth'?'Growth 2020-25':mapView==='age'?'Median Age':'Urbanization %'}</div>
            <div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:80,height:8,borderRadius:4,background:'linear-gradient(to right, #141c28, #1a6b50, #4fd1a5)'}}/><span style={{fontSize:8,color:'#5a6478'}}>Low → High</span></div>
            <div style={{display:'flex',alignItems:'center',gap:6,marginTop:6}}><div style={{width:8,height:8,borderRadius:'50%',background:'#f0c040'}}/><span style={{fontSize:8,color:'#5a6478'}}>DMA Markets (click to select)</span></div>
          </div>
          {hoveredState && (()=>{
            const s=STATE_DATA.find(st=>st.abbr===hoveredState); if(!s)return null;
            const growth=((s.pop2025-s.pop2020)/s.pop2020*100);
            return(<div style={{position:'absolute',top:16,left:'50%',transform:'translateX(-50%)',background:'#0f1520f0',borderRadius:10,padding:'12px 16px',border:'1px solid #1e2b40',backdropFilter:'blur(12px)',minWidth:220}}>
              <div style={{fontSize:13,fontWeight:600,color:'#e8ecf4',marginBottom:6}}>{s.name}</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px 16px',fontSize:11}}>
                <span style={{color:'#5a6478'}}>Pop 2025</span><span style={{color:'#c8cdd8',fontFamily:'"JetBrains Mono",monospace',fontSize:10}}>{fmt(s.pop2025)}</span>
                <span style={{color:'#5a6478'}}>Growth</span><span style={{color:growth>0?'#4fd1a5':'#e06070',fontFamily:'"JetBrains Mono",monospace',fontSize:10}}>{growth>0?'+':''}{growth.toFixed(1)}%</span>
                <span style={{color:'#5a6478'}}>Med. Age</span><span style={{color:'#c8cdd8',fontFamily:'"JetBrains Mono",monospace',fontSize:10}}>{s.medAge}</span>
                <span style={{color:'#5a6478'}}>Urban</span><span style={{color:'#c8cdd8',fontFamily:'"JetBrains Mono",monospace',fontSize:10}}>{s.urban}%</span>
              </div>
            </div>);
          })()}
        </div>
      </div>

      {/* RIGHT PANEL */}
      <div style={{width:380,minWidth:380,background:'#0c1019',borderLeft:'1px solid #1a2035',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{display:'flex',borderBottom:'1px solid #1a2035'}}>
          {[["geo","Geography"],["dma","DMA Markets"],["platforms","Platforms"],["summary","Export"]].map(([k,l])=>(
            <button key={k} onClick={()=>setActiveTab(k)} style={{flex:1,padding:'12px 8px',border:'none',borderBottom:activeTab===k?'2px solid #4fd1a5':'2px solid transparent',background:'transparent',color:activeTab===k?'#4fd1a5':'#4a5568',fontSize:10,fontWeight:600,cursor:'pointer',letterSpacing:0.5,textTransform:'uppercase',transition:'all 0.15s'}}>{l}</button>
          ))}
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'16px'}}>

          {activeTab==="geo" && (
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              {summary ? (<>
                <div style={{background:'linear-gradient(135deg,#0e1a24,#0f2018)',borderRadius:12,padding:20,border:'1px solid #1a2b30'}}>
                  <div style={{fontSize:10,fontWeight:600,color:'#4fd1a5',letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>Estimated Reachable Population</div>
                  <div style={{fontSize:32,fontWeight:700,color:'#e8ecf4',letterSpacing:-1,fontFamily:'"JetBrains Mono",monospace'}}>{fmt(summary.totalPop)}</div>
                  <div style={{fontSize:12,color:'#5a6478',marginTop:4}}>{fmtPct(summary.usPct)} of U.S. · {summary.states.length} state{summary.states.length!==1?'s':''} selected</div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  <MetricCard label="5-Year Growth" value={(summary.growthPct>0?'+':'')+summary.growthPct.toFixed(1)+'%'} color={summary.growthPct>0?'#4fd1a5':'#e06070'}/>
                  <MetricCard label="Avg Med. Age" value={summary.avgAge.toFixed(1)} color="#7eb8da"/>
                  <MetricCard label="Avg Urban %" value={summary.avgUrban.toFixed(0)+'%'} color="#b8a9e8"/>
                  <MetricCard label="Annual Births" value={fmtCompact(summary.totalBirths)} color="#f0c040"/>
                  <MetricCard label="Annual Deaths" value={fmtCompact(summary.totalDeaths)} color="#e06070"/>
                  <MetricCard label="Net Migration" value={fmtCompact(summary.totalIntlMig+summary.totalDomMig)} color="#4fd1a5"/>
                </div>
                <div style={{background:'#0e1218',borderRadius:10,padding:14,border:'1px solid #1a2035'}}>
                  <div style={{fontSize:10,fontWeight:600,color:'#4a5568',letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>Weighted Ethnic Composition</div>
                  <div style={{display:'flex',height:8,borderRadius:4,overflow:'hidden',marginBottom:8}}>
                    <div style={{width:summary.avgWhite+'%',background:'#7eb8da',transition:'width 0.3s'}}/>
                    <div style={{width:summary.avgBlack+'%',background:'#b8a9e8',transition:'width 0.3s'}}/>
                    <div style={{width:summary.avgHisp+'%',background:'#f0c040',transition:'width 0.3s'}}/>
                    <div style={{flex:1,background:'#2a3040'}}/>
                  </div>
                  <div style={{display:'flex',gap:12,fontSize:10}}>
                    <span><span style={{color:'#7eb8da'}}>●</span> White {summary.avgWhite.toFixed(1)}%</span>
                    <span><span style={{color:'#b8a9e8'}}>●</span> Black {summary.avgBlack.toFixed(1)}%</span>
                    <span><span style={{color:'#f0c040'}}>●</span> Hispanic {summary.avgHisp.toFixed(1)}%</span>
                  </div>
                </div>
                <div style={{background:'#0e1218',borderRadius:10,padding:14,border:'1px solid #1a2035'}}>
                  <div style={{fontSize:10,fontWeight:600,color:'#4a5568',letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>Growth by Selected State (2020-25)</div>
                  <div style={{display:'flex',flexDirection:'column',gap:4,maxHeight:200,overflowY:'auto'}}>
                    {summary.states.sort((a,b)=>{const ga=(a.pop2025-a.pop2020)/a.pop2020,gb=(b.pop2025-b.pop2020)/b.pop2020;return gb-ga;}).map(s=>{
                      const g=((s.pop2025-s.pop2020)/s.pop2020)*100, barW=Math.abs(g)/11*100;
                      return(<div key={s.abbr} style={{display:'flex',alignItems:'center',gap:6,fontSize:10}}>
                        <span style={{width:24,color:'#7a8299',fontWeight:500,flexShrink:0}}>{s.abbr}</span>
                        <div style={{flex:1,height:6,background:'#141c28',borderRadius:3,overflow:'hidden'}}><div style={{width:Math.min(100,barW)+'%',height:'100%',borderRadius:3,background:g>0?'#4fd1a5':'#e06070',transition:'width 0.3s'}}/></div>
                        <span style={{width:44,textAlign:'right',fontFamily:'"JetBrains Mono",monospace',fontSize:9,color:g>0?'#4fd1a5':'#e06070',flexShrink:0}}>{g>0?'+':''}{g.toFixed(1)}%</span>
                      </div>);
                    })}
                  </div>
                </div>
                <div style={{background:'#0e1218',borderRadius:10,padding:14,border:'1px solid #1a2035'}}>
                  <div style={{fontSize:10,fontWeight:600,color:'#4a5568',letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>Selected States Detail</div>
                  <div style={{overflowX:'auto'}}>
                    <table style={{width:'100%',borderCollapse:'collapse',fontSize:10}}>
                      <thead><tr style={{borderBottom:'1px solid #1e2740'}}>
                        {['State','Pop 2025','Growth','Med Age','Urban','Top Employer'].map(h=><th key={h} style={{padding:'6px 4px',textAlign:'left',color:'#4a5568',fontWeight:600,fontSize:9,letterSpacing:0.5,whiteSpace:'nowrap'}}>{h}</th>)}
                      </tr></thead>
                      <tbody>{summary.states.sort((a,b)=>b.pop2025-a.pop2025).map(s=>{
                        const g=((s.pop2025-s.pop2020)/s.pop2020)*100;
                        return(<tr key={s.abbr} style={{borderBottom:'1px solid #131a28'}}>
                          <td style={{padding:'5px 4px',fontWeight:500,color:'#c8cdd8'}}>{s.abbr}</td>
                          <td style={{padding:'5px 4px',fontFamily:'"JetBrains Mono",monospace',fontSize:9,color:'#c8cdd8'}}>{fmtCompact(s.pop2025)}</td>
                          <td style={{padding:'5px 4px',fontFamily:'"JetBrains Mono",monospace',fontSize:9,color:g>0?'#4fd1a5':'#e06070'}}>{g>0?'+':''}{g.toFixed(1)}%</td>
                          <td style={{padding:'5px 4px',fontFamily:'"JetBrains Mono",monospace',fontSize:9}}>{s.medAge}</td>
                          <td style={{padding:'5px 4px',fontFamily:'"JetBrains Mono",monospace',fontSize:9}}>{s.urban}%</td>
                          <td style={{padding:'5px 4px',fontSize:9,color:'#7a8299',maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.topEmployer}</td>
                        </tr>);
                      })}</tbody>
                    </table>
                  </div>
                </div>
              </>) : <EmptyState message="Select states on the map or use region filters to begin your media plan"/>}
            </div>
          )}

          {activeTab==="dma" && (
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div style={{fontSize:10,color:'#5a6478',marginBottom:4}}>Click DMA dots on the map or select below. Showing top {dmaRankMax} markets.</div>
              {selectedDMAs.size>0 && (
                <div style={{background:'linear-gradient(135deg,#1a1a0e,#1a180e)',borderRadius:12,padding:16,border:'1px solid #2a2820'}}>
                  <div style={{fontSize:10,fontWeight:600,color:'#f0c040',letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>Selected DMA Reach</div>
                  <div style={{fontSize:28,fontWeight:700,color:'#e8ecf4',fontFamily:'"JetBrains Mono",monospace'}}>{fmt(DMA_DATA.filter(d=>selectedDMAs.has(d.rank)).reduce((a,d)=>a+d.tvHH,0))}</div>
                  <div style={{fontSize:11,color:'#5a6478'}}>TV Households · {DMA_DATA.filter(d=>selectedDMAs.has(d.rank)).reduce((a,d)=>a+d.pct,0).toFixed(2)}% of U.S.</div>
                </div>
              )}
              <div style={{display:'flex',flexDirection:'column',gap:2}}>
                {DMA_DATA.filter(d=>d.rank<=dmaRankMax).map(d=>{
                  const isSel=selectedDMAs.has(d.rank);
                  return(<div key={d.rank} onClick={()=>toggleDMA(d.rank)} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:8,cursor:'pointer',background:isSel?'#1a1a0e':'transparent',border:'1px solid '+(isSel?'#3a3520':'transparent'),transition:'all 0.15s'}}>
                    <span style={{width:22,height:22,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:600,background:isSel?'#f0c040':'#1a2035',color:isSel?'#080b12':'#4a5568',flexShrink:0}}>#{d.rank}</span>
                    <div style={{flex:1,minWidth:0}}><div style={{fontSize:11,fontWeight:500,color:'#c8cdd8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.market}</div></div>
                    <div style={{textAlign:'right',flexShrink:0}}><div style={{fontSize:10,fontFamily:'"JetBrains Mono",monospace',color:'#c8cdd8'}}>{fmtCompact(d.tvHH)}</div><div style={{fontSize:8,color:'#4a5568'}}>{d.pct}% US</div></div>
                  </div>);
                })}
              </div>
            </div>
          )}

          {activeTab==="platforms" && (
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div style={{fontSize:10,color:'#5a6478',marginBottom:4}}>U.S. daily active user reach by platform. Estimated overlap-adjusted reach shown for selected region.</div>
              {PLATFORM_DATA.filter(p=>selectedPlatforms.has(p.name)).map(p=>{
                const regionPop=summary?summary.totalPop:341784857;
                const estReach=Math.round(regionPop*p.pctPop/100);
                return(<div key={p.name} style={{background:'#0e1218',borderRadius:10,padding:14,border:'1px solid #1a2035'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                    <div style={{width:10,height:10,borderRadius:'50%',background:p.color,flexShrink:0}}/>
                    <span style={{fontSize:13,fontWeight:600,color:'#e8ecf4'}}>{p.name}</span>
                    <span style={{marginLeft:'auto',fontSize:10,color:'#4a5568'}}>DAU: {p.dauUS}</span>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,fontSize:10}}>
                    <div><div style={{color:'#4a5568',fontSize:9}}>U.S. DAU</div><div style={{color:'#c8cdd8',fontFamily:'"JetBrains Mono",monospace'}}>{p.dauUS}</div></div>
                    <div><div style={{color:'#4a5568',fontSize:9}}>U.S. MAU</div><div style={{color:'#c8cdd8',fontFamily:'"JetBrains Mono",monospace'}}>{p.mauUS}</div></div>
                    <div><div style={{color:'#4a5568',fontSize:9}}>Est. Region DAU</div><div style={{color:'#4fd1a5',fontFamily:'"JetBrains Mono",monospace',fontWeight:600}}>{fmtCompact(estReach)}</div></div>
                  </div>
                  <div style={{marginTop:8,height:6,background:'#141c28',borderRadius:3,overflow:'hidden'}}><div style={{width:p.pctPop+'%',height:'100%',background:p.color,borderRadius:3,opacity:0.7}}/></div>
                  <div style={{fontSize:8,color:'#3e4a60',marginTop:4}}>{p.pctPop}% daily penetration of U.S. population</div>
                </div>);
              })}
            </div>
          )}

          {activeTab==="summary" && (
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              {summary ? (<>
                <div style={{fontSize:12,fontWeight:600,color:'#e8ecf4',marginBottom:4}}>Media Plan Brief</div>
                <div style={{background:'#0e1218',borderRadius:10,padding:16,border:'1px solid #1a2035',fontSize:11,lineHeight:1.7}}>
                  <div style={{fontWeight:600,color:'#4fd1a5',marginBottom:8}}>Geographic Targeting</div>
                  <div style={{color:'#7a8299'}}>States: <span style={{color:'#c8cdd8'}}>{summary.states.map(s=>s.abbr).join(', ')}</span></div>
                  <div style={{color:'#7a8299'}}>Total Est. Population: <span style={{color:'#c8cdd8',fontFamily:'"JetBrains Mono",monospace'}}>{fmt(summary.totalPop)}</span></div>
                  <div style={{color:'#7a8299'}}>Share of U.S.: <span style={{color:'#c8cdd8'}}>{fmtPct(summary.usPct)}</span></div>
                  <div style={{color:'#7a8299'}}>5-Year Growth: <span style={{color:summary.growthPct>0?'#4fd1a5':'#e06070'}}>{(summary.growthPct>0?'+':'')+summary.growthPct.toFixed(2)}%</span></div>
                  <div style={{color:'#7a8299'}}>Weighted Median Age: <span style={{color:'#c8cdd8'}}>{summary.avgAge.toFixed(1)}</span></div>
                  <div style={{color:'#7a8299'}}>Weighted Urbanization: <span style={{color:'#c8cdd8'}}>{summary.avgUrban.toFixed(0)}%</span></div>
                </div>
                <div style={{background:'#0e1218',borderRadius:10,padding:16,border:'1px solid #1a2035',fontSize:11,lineHeight:1.7}}>
                  <div style={{fontWeight:600,color:'#f0c040',marginBottom:8}}>DMA Markets</div>
                  {selectedDMAs.size>0 ? (<>
                    <div style={{color:'#7a8299'}}>Markets: <span style={{color:'#c8cdd8'}}>{DMA_DATA.filter(d=>selectedDMAs.has(d.rank)).map(d=>d.market).join(', ')}</span></div>
                    <div style={{color:'#7a8299'}}>TV Households: <span style={{color:'#c8cdd8',fontFamily:'"JetBrains Mono",monospace'}}>{fmt(DMA_DATA.filter(d=>selectedDMAs.has(d.rank)).reduce((a,d)=>a+d.tvHH,0))}</span></div>
                  </>) : <div style={{color:'#4a5568'}}>No DMA markets selected</div>}
                </div>
                <div style={{background:'#0e1218',borderRadius:10,padding:16,border:'1px solid #1a2035',fontSize:11,lineHeight:1.7}}>
                  <div style={{fontWeight:600,color:'#b8a9e8',marginBottom:8}}>Platform Reach Estimates</div>
                  {PLATFORM_DATA.filter(p=>selectedPlatforms.has(p.name)).map(p=>{
                    const reach=Math.round(summary.totalPop*p.pctPop/100);
                    return(<div key={p.name} style={{display:'flex',justifyContent:'space-between',color:'#7a8299'}}>
                      <span>{p.name}</span><span style={{color:'#c8cdd8',fontFamily:'"JetBrains Mono",monospace',fontSize:10}}>~{fmtCompact(reach)} DAU est.</span>
                    </div>);
                  })}
                </div>
                <div style={{background:'#0e1218',borderRadius:10,padding:16,border:'1px solid #1a2035',fontSize:11,lineHeight:1.7}}>
                  <div style={{fontWeight:600,color:'#7eb8da',marginBottom:8}}>Demographic Composition</div>
                  <div style={{color:'#7a8299'}}>White: <span style={{color:'#c8cdd8'}}>{summary.avgWhite.toFixed(1)}%</span></div>
                  <div style={{color:'#7a8299'}}>Black: <span style={{color:'#c8cdd8'}}>{summary.avgBlack.toFixed(1)}%</span></div>
                  <div style={{color:'#7a8299'}}>Hispanic: <span style={{color:'#c8cdd8'}}>{summary.avgHisp.toFixed(1)}%</span></div>
                  <div style={{color:'#7a8299'}}>Annual Births: <span style={{color:'#c8cdd8'}}>{fmt(summary.totalBirths)}</span></div>
                  <div style={{color:'#7a8299'}}>Annual Deaths: <span style={{color:'#c8cdd8'}}>{fmt(summary.totalDeaths)}</span></div>
                  <div style={{color:'#7a8299'}}>Intl. Migration: <span style={{color:'#c8cdd8'}}>{fmt(summary.totalIntlMig)}</span></div>
                  <div style={{color:'#7a8299'}}>Dom. Migration: <span style={{color:summary.totalDomMig>0?'#4fd1a5':'#e06070'}}>{fmt(summary.totalDomMig)}</span></div>
                </div>
                <div style={{background:'#0e1218',borderRadius:10,padding:16,border:'1px solid #1a2035',fontSize:10,color:'#3e4a60',lineHeight:1.5}}>
                  <div style={{fontWeight:600,color:'#4a5568',marginBottom:4}}>Data Sources</div>
                  U.S. Census Bureau Vintage 2025 Population Estimates · CDC PLACES 2025 Release · Nielsen DMA Rankings 2026 · Platform-reported U.S. DAU/MAU data (Q4 2025) · SBA Office of Advocacy 2025 · BLS OES 2024
                </div>
              </>) : <EmptyState message="Build your targeting plan by selecting states and DMA markets, then review the consolidated brief here"/>}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
